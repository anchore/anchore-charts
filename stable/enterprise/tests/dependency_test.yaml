suite: Dependency Resource Tests
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 9.9.9
  appVersion: 9.9.9

set:
  postgresql.externalEndpoint: test-postgresql
  postgresql.auth.username: test-user
  postgresql.auth.password: test-password
  postgresql.auth.database: test-db
tests:
  - it: should render defaults
    documentIndex: 0
    templates:
      - charts/ui-redis/templates/master/application.yaml
    asserts:
      - matchSnapshot:
          path: spec.template.spec

  - it: should render the pullcreds by default
    templates:
      - charts/ui-redis/templates/master/application.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: anchore-enterprise-pullcreds

  - it: should render the pullcreds when specified for ui-redis
    templates:
      - charts/ui-redis/templates/master/application.yaml
    set:
      ui-redis.image.pullSecrets:
        - myCustomPullcreds
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: myCustomPullcreds
