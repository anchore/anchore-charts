suite: Policy Engine HPA Tests
templates:
  - policyengine_hpa.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 9.9.9
  appVersion: 9.9.9
set:
  anchoreConfig.policy_engine.vulnerabilities.matching.exclude.providers: []
  anchoreConfig.policy_engine.vulnerabilities.matching.exclude.package_types: []

tests:
  - it: should not render HPA by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HPA when autoscaling is enabled
    set:
      policyEngine.autoscaling.enabled: true
      policyEngine.autoscaling.minReplicas: 2
      policyEngine.autoscaling.maxReplicas: 5
      policyEngine.autoscaling.targetCPUUtilizationPercentage: 70
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: apiVersion
          value: autoscaling/v2
      - equal:
          path: metadata.name
          value: test-release-enterprise-policy
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: apps/v1
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: test-release-enterprise-policy
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 5
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 70

  - it: should render memory metric when targetMemoryUtilizationPercentage is set
    set:
      policyEngine.autoscaling.enabled: true
      policyEngine.autoscaling.minReplicas: 1
      policyEngine.autoscaling.maxReplicas: 3
      policyEngine.autoscaling.targetCPUUtilizationPercentage: 80
      policyEngine.autoscaling.targetMemoryUtilizationPercentage: 75
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 75

  - it: should render correct labels
    set:
      policyEngine.autoscaling.enabled: true
      policyEngine.autoscaling.minReplicas: 1
      policyEngine.autoscaling.maxReplicas: 3
      policyEngine.autoscaling.targetCPUUtilizationPercentage: 80
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: test-release-enterprise
            app.kubernetes.io/component: policyengine
