# Anchore Enterprise NG Application Configuration
#
# Contains all configuration that can be reconciled with DB-stored config
# by the config compiler.  Values here follow the priority:
#   CONFIG_FILE > API > INHERITED_DEFAULT > DEFAULT
#
# Load this ALONGSIDE the bootstrap config (bootstrap.yaml).  The two are
# deep-merged before validation.

# Internal SSL verification
internal_ssl_verify: {{ .Values.anchoreConfig.internal_ssl_verify }}

# Global client timeouts
global_client_connect_timeout: ${ANCHORE_GLOBAL_CLIENT_CONNECT_TIMEOUT}
global_client_read_timeout: ${ANCHORE_GLOBAL_CLIENT_READ_TIMEOUT}

# Global logging settings (can be overridden per service under `services.*.logging`)
logging:
  log_level: ${ANCHORE_LOG_LEVEL}
  colored_logging: ${ANCHORE_COLORED_LOGGING}
  exception_backtrace_logging: ${ANCHORE_EXCEPTION_BACKTRACE_LOGGING}
  exception_diagnose_logging: ${ANCHORE_EXCEPTION_DIAGNOSE_LOGGING}

# Feature-domain configuration (NG-owned, namespaced under `domains.*` in the DB)
domains:
  jobs:
    pool_size: ${ANCHORE_JOB_POOL_SIZE}
  catalog: {}

# Per-service overrides are in files/{component}/config_ng.yaml