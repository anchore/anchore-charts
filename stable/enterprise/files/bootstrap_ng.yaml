# Anchore Enterprise NG Bootstrap Configuration
#
# Contains the minimum configuration required to start the service:
# database credentials, authentication keys, host identity, and service
# instance fields.  These values are NEVER stored in the system_configurations
# table — they are always read from this file.

# Host identification
host_id: ${ANCHORE_HOST_ID}

# Database credentials
credentials:
  database:
    user: ${ANCHORE_DB_USER}
    password: ${ANCHORE_DB_PASSWORD}
    host: ${ANCHORE_DB_HOST}
    port: ${ANCHORE_DB_PORT}
    database: ${ANCHORE_DB_NAME}
    db_connect_args:
      connect_timeout: 120
    db_engine_args:
      pool_size: 30
      max_overflow: 100
  # Optional read replica configuration
  # database_read_replica:
  #   user: ${ANCHORE_DB_USER}
  #   password: ${ANCHORE_DB_PASSWORD}
  #   host: ${ANCHORE_DB_READ_REPLICA_HOST}
  #   port: ${ANCHORE_DB_PORT}
  #   database: ${ANCHORE_DB_NAME}
  #   db_connect_args:
  #     connect_timeout: 120
  #   db_engine_args:
  #     pool_size: 30
  #     max_overflow: 100

# Authentication keys
keys:
  secret: ${ANCHORE_AUTH_SECRET}
  public_key_path: {{ .Values.anchoreConfig.keys.publicKeyFileName }}
  private_key_path: {{ .Values.anchoreConfig.keys.privateKeyFileName }}

# OAuth configuration
oauth:
  default_token_expiration_seconds: {{ .Values.anchoreConfig.user_authentication.oauth.default_token_expiration_seconds }}

# Object store configuration
# Default is the database driver. For S3, uncomment and configure:
# object_store:
#   storage_driver:
#     name: s3
#     access_key: ${ANCHORE_OBJECT_STORE_S3_ACCESS_KEY}
#     secret_key: ${ANCHORE_OBJECT_STORE_S3_SECRET_KEY}
#     bucket: ${ANCHORE_OBJECT_STORE_S3_BUCKET}
#     url: ${ANCHORE_OBJECT_STORE_S3_URL}
#     region: ${ANCHORE_OBJECT_STORE_S3_REGION}
#     create_bucket: false
