{{- if and (not .Values.useExistingSecrets) (not .Values.injectSecretsViaEnv) -}}
{{- $component := "hooks" -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ template "enterprise.hooks.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "enterprise.common.labels" (merge (dict "component" $component) .) | nindent 4 }}
  annotations: {{- include "enterprise.common.annotations" (merge (dict "component" $component "nil" true) .) | nindent 4 }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  ANCHORE_DB_HOST: {{ include "enterprise.dbHostname" . | quote }}
  ANCHORE_DB_NAME: {{ required "postgresql.auth.database is required" .Values.postgresql.auth.database | quote }}
  ANCHORE_DB_USER: {{ required "postgresql.auth.username is required" .Values.postgresql.auth.username | quote }}
  ANCHORE_DB_PASSWORD: {{ required "postgresql.auth.password is required" .Values.postgresql.auth.password | quote }}
  ANCHORE_DB_PORT: {{ .Values.postgresql.port | quote }}
  ANCHORE_DB_SSL_MODE: {{ .Values.anchoreConfig.database.sslMode | quote }}
{{- with .Values.anchoreConfig.database.sslRootCertFileName }}
  ANCHORE_DB_SSL_ROOT_CERT: "/home/anchore/certs/{{- . }}"
{{- else }}
  ANCHORE_DB_SSL_ROOT_CERT: "null"
{{- end }}
{{- end -}}
