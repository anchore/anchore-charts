{{/*
Create a combined secret for object_store and analysis_archive storage driver credentials
when access_key/secret_key are provided inline and existingCredentialSecret is not set.
*/}}

{{- $osaaSecretNeeded := false -}}
{{- $secretData := dict -}}

{{- range $storeName, $storeValues := dict "object_store" $.Values.anchoreConfig.catalog.object_store "analysis_archive" $.Values.anchoreConfig.catalog.analysis_archive }}
{{- if $storeValues }}
{{- $sd := index $storeValues "storage_driver" }}
{{- if $sd }}
{{- $sdConfig := index $sd "config" }}
{{- if $sdConfig }}
{{- if and (not (index $sdConfig "existingCredentialSecret")) (index $sdConfig "access_key") (index $sdConfig "secret_key") }}
  {{- $osaaSecretNeeded = true -}}
  {{- $_ := set $secretData (printf "%s_access_key" $storeName) (index $sdConfig "access_key") -}}
  {{- $_ := set $secretData (printf "%s_secret_key" $storeName) (index $sdConfig "secret_key") -}}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if $osaaSecretNeeded }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "enterprise.fullname" . }}-osaa-creds
  namespace: {{ .Release.Namespace }}
  labels: {{- include "enterprise.common.labels" . | nindent 4 }}
  annotations: {{- include "enterprise.common.annotations" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := $secretData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}

{{/*
Create a separate secret for OSAA migration job storage driver credentials.
Only rendered when osaaMigrationJob is enabled and migration configs have inline creds.
This is a helm pre-upgrade hook so it exists alongside the migration job.
*/}}

{{- $migrationSecretNeeded := false -}}
{{- $migrationSecretData := dict -}}

{{- if $.Values.osaaMigrationJob.enabled -}}
{{- $migrationStores := dict -}}
{{- if and $.Values.osaaMigrationJob.objectStoreMigration $.Values.osaaMigrationJob.objectStoreMigration.run $.Values.osaaMigrationJob.objectStoreMigration.object_store }}
  {{- $_ := set $migrationStores "object_store" $.Values.osaaMigrationJob.objectStoreMigration.object_store }}
{{- end }}
{{- if and $.Values.osaaMigrationJob.analysisArchiveMigration $.Values.osaaMigrationJob.analysisArchiveMigration.run $.Values.osaaMigrationJob.analysisArchiveMigration.analysis_archive }}
  {{- $_ := set $migrationStores "analysis_archive" $.Values.osaaMigrationJob.analysisArchiveMigration.analysis_archive }}
{{- end }}

{{- range $storeName, $storeValues := $migrationStores }}
{{- if $storeValues }}
{{- $sd := index $storeValues "storage_driver" }}
{{- if $sd }}
{{- $sdConfig := index $sd "config" }}
{{- if $sdConfig }}
{{- if and (not (index $sdConfig "existingCredentialSecret")) (index $sdConfig "access_key") (index $sdConfig "secret_key") }}
  {{- $migrationSecretNeeded = true -}}
  {{- $_ := set $migrationSecretData (printf "%s_access_key" $storeName) (index $sdConfig "access_key") -}}
  {{- $_ := set $migrationSecretData (printf "%s_secret_key" $storeName) (index $sdConfig "secret_key") -}}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if $migrationSecretNeeded }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "enterprise.fullname" . }}-osaa-migration-creds
  namespace: {{ .Release.Namespace }}
  labels: {{- include "enterprise.common.labels" . | nindent 4 }}
  annotations: {{- include "enterprise.common.annotations" (merge (dict "nil" true) .) | nindent 4 }}
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  {{- range $key, $value := $migrationSecretData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
